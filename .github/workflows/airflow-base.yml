name: Build airflow-base

on:
  push:
    branches:
      - main
    paths:
      - "airflow/base/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/airflow-base
  # Base Apache Airflow version — drives both the build-arg and the image tag.
  # Keep in sync with the ARG default in airflow/base/Dockerfile and the base
  # image in docker-compose.yaml.
  AIRFLOW_VERSION: 3.1.8

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ env.AIRFLOW_VERSION }}
            type=raw,value=${{ env.AIRFLOW_VERSION }}-${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: airflow/base
          push: true
          build-args: |
            AIRFLOW_VERSION=${{ env.AIRFLOW_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}